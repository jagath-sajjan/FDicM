name: fdicm
base: core22
version: '1.0.0'
summary: Blazing fast responsive split pane terminal dictionary app engine
description: |
  High fidelity split pane responsive terminal dictionary client application
  featuring fuzzy matching auto completion and local compressed offline storage fallbacks

grade: stable
confinement: strict

apps:
  fdicm:
    command: bin/fdicm
    plugs:
      - network
      - home

parts:
  fdicm:
    plugin: dump
    source:
      - on arm64: https://github.com/jagath-sajjan/FDicM/releases/download/v1.0.0/fdicm_v1.0.0_linux_arm64.tar.gz
      - on amd64: https://github.com/jagath-sajjan/FDicM/releases/download/v1.0.0/fdicm_v1.0.0_linux_amd64.tar.gz
    organize:
      fdicm: bin/fdicm
